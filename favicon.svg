<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <style>
      .ring { fill: none; stroke-linecap: round; stroke-linejoin: round; }
    </style>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="1" stdDeviation="1.2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="12" ry="12" fill="#ffffff"/>
  <!-- OpenCV-like tri-color rings -->
  <g filter="url(#s)">
    <circle class="ring" cx="20" cy="20" r="11" stroke="#E53935" stroke-width="10"/>
    <circle class="ring" cx="44" cy="20" r="11" stroke="#1E88E5" stroke-width="10"/>
    <circle class="ring" cx="32" cy="42" r="11" stroke="#43A047" stroke-width="10"/>
  </g>
  <!-- Subtle inner dot for balance -->
  <circle cx="32" cy="32" r="2.5" fill="#0B1221" opacity="0.6"/>
</svg>
